<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Tab 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Lato:wght@300;400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Full-screen Background Image -->
  <div id="bg-image"></div>

  <!-- Dark Vignette Overlay -->
  <div class="overlay"></div>

  <!-- Floating Hearts -->
  <div id="hearts-bg"></div>

  <!-- Main Content Card -->
  <div class="container">

    <!-- Clock & Date -->
    <div class="clock-wrap">
      <p id="clock"></p>
      <p id="date"></p>
    </div>

    <!-- Decorative Divider -->
    <div class="divider"><span>💖</span></div>

    <!-- Quote of the Day -->
    <div class="quote-card">
      <p class="quote-label">✨ Quote of the Day</p>
      <p id="quote" class="quote-text"></p>
      <p id="quote-author" class="quote-author"></p>
    </div>

    <!-- Divider -->
    <div class="divider"><span>🌹</span></div>

    <!-- Daily Sweet Compliment -->
    <p id="compliment" class="compliment"></p>

  </div>

  <script src="script.js"></script>
</body>

</html>
